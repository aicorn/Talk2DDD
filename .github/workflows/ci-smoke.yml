name: CI - Smoke Tests

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend-smoke:
    name: Backend Smoke Tests
    runs-on: self-hosted
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talk2ddd
          POSTGRES_PASSWORD: password
          POSTGRES_DB: talk2ddd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talk2ddd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://talk2ddd:password@localhost:5432/talk2ddd
          SECRET_KEY: test-secret-key-for-ci-smoke-minimum-32ch
          AI_PROVIDER: openai
          OPENAI_API_KEY: sk-test
        run: alembic upgrade head

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://talk2ddd:password@localhost:5432/talk2ddd
          SECRET_KEY: test-secret-key-for-ci-smoke-minimum-32ch
          AI_PROVIDER: openai
          OPENAI_API_KEY: sk-test
          REDIS_URL: redis://localhost:6379/0
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start within 60 seconds"
          exit 1

      - name: Smoke test - health endpoint
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Expected healthy, got: {data}'
          assert data['service'] == 'Talk2DDD API', f'Unexpected service name: {data}'
          print('Health endpoint OK')
          "

      - name: Smoke test - root endpoint
        run: |
          response=$(curl -sf http://localhost:8000/)
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'message' in data, f'Missing message field: {data}'
          assert 'version' in data, f'Missing version field: {data}'
          assert 'docs' in data, f'Missing docs field: {data}'
          print('Root endpoint OK')
          "

      - name: Smoke test - OpenAPI schema accessible
        run: |
          response=$(curl -sf http://localhost:8000/openapi.json)
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['info']['title'] == 'Talk2DDD', f'Unexpected title: {data[\"info\"]}'
          print('OpenAPI schema OK')
          "

      - name: Smoke test - user registration
        run: |
          response=$(curl -sf -X POST http://localhost:8000/api/v1/users/register \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@example.com","username":"smoketest","full_name":"Smoke Test","password":"smokepass123"}')
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data.get('email') == 'smoke@example.com', f'Unexpected email: {data}'
          assert data.get('username') == 'smoketest', f'Unexpected username: {data}'
          assert 'id' in data, f'Missing id field: {data}'
          assert 'hashed_password' not in data, 'hashed_password must not be exposed'
          print('User registration OK')
          "

      - name: Smoke test - user login
        run: |
          response=$(curl -sf -X POST http://localhost:8000/api/v1/users/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@example.com","password":"smokepass123"}')
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'access_token' in data, f'Missing access_token: {data}'
          assert data.get('token_type') == 'bearer', f'Unexpected token_type: {data}'
          print('User login OK')
          "

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" || true
            rm -f /tmp/uvicorn.pid
          fi

  frontend-smoke:
    name: Frontend Build Smoke Test
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
